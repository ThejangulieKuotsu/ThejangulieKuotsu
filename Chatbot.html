<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB Chat Interface - High Contrast</title>
    <style>
        :root {
            /* Modified for solid black background and stark white chatbox card */
            --bg-workspace: #000000; /* Solid Black */
            --bg-card: #ffffff; /* Stark White */
            --border-line: #dcdcdc; /* Light Grey */
            --text-main: #111111; /* Dark grey/black for high contrast on white */
            --text-muted: #555555; /* Muted slate for secondary text */
            --primary-accent: #4a708b; /* Muted Blue*/
            --secondary-accent: #f5f5f5; /* Off-White*/
            --user-bubble: #000000; /* Light Grey */
            --assistant-bubble: #000000; /* Muted Blue*/
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-workspace);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-wrapper {
            background: var(--bg-card);
            border: 2px solid var(--border-line);
            border-radius: 16px;
            width: 100%;
            max-width: 680px;
            height: 82vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* Top RGB woven banner line */
        .chat-wrapper::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: repeating-linear-gradient(
                
                
            );
            z-index: 210;
        }

        .api-header {
            padding: 16px 24px;
            background: #f5f5f7; /* Very light grey header background */
            border-bottom: 2px solid var(--border-line);
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 10;
        }

        .api-header input {
            flex-grow: 1;
            background: #ffffff;
            border: 1px solid var(--primary-accent);
            padding: 10px 14px;
            border-radius: 8px;
            color: #111111;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .api-header input:focus {
            outline: 2px solid #0000ff;
        }

        .message-pane {
            flex-grow: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            background: #ffffff; /* White chat background panel */
        }

        .hornbill-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 180px;
            opacity: 1; /* Subdued watermark for visibility on light bg */
            pointer-events: none;
            z-index: 0;
            fill: #87cebb;
        }

        .message-row {
            display: flex;
            width: 100%;
            z-index: 5;
        }

        .message-row.user { justify-content: flex-end; }
        .message-row.assistant { justify-content: flex-start; }

        .bubble {
            max-width: 82%;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 0.98rem;
            line-height: 1.55;
            word-wrap: break-word;
        }

        .message-row.user .bubble {
            background: var(--user-bubble);
            color: #ffffff;
            border-bottom-right-radius: 4px;
            border-left: 4px solid #000000;
            box-shadow: 0 4px 12px rgba(255, 0, 0, 0.2);
        }

        .message-row.assistant .bubble {
            background: var(--assistant-bubble);
            color: #ffffff;
            border-bottom-left-radius: 4px;
            border-right: 4px solid #000000;
            box-shadow: 0 4px 12px rgba(0, 0, 255, 0.2);
        }

        .system-alert {
            align-self: center;
            background: rgba(255, 0, 0, 0.1);
            border: 2px solid #ff0000;
            color: #ff0000;
            font-size: 0.85rem;
            padding: 6px 16px;
            border-radius: 8px;
            z-index: 5;
        }

        .input-bar {
            padding: 20px 24px 24px 24px;
            border-top: 2px solid var(--border-line);
            background: #f5f5f7; /* Very light grey bottom panel input bar */
            display: flex;
            gap: 12px;
            align-items: flex-end;
            z-index: 10;
        }

        .input-bar textarea {
            flex-grow: 1;
            background: #ffffff;
            border: 1px solid #dcdcdc;
            padding: 14px;
            border-radius: 12px;
            color: #111111;
            resize: none;
            height: 52px;
            font-size: 1rem;
            line-height: 1.4;
        }

        .input-bar textarea:focus {
            outline: 2px solid #000000;
        }

        .send-btn {
            background: #ff0000;
            color: white;
            border: none;
            height: 52px;
            padding: 0 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: #001a33;
            color: #000000;
            transform: translateY(-1px);
        }

        .send-btn:disabled {
            background: #0000ff;
            color: #ffffff;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

    <div class="chat-wrapper">
        <div class="api-header">
            <span style="font-size: 0.8rem; font-weight: 700; color: #000000; letter-spacing: 1.5px;"> Qwen3 AI Assistant:</span>
            <input type="password" id="apiKeyInput" placeholder="gsk_..." autocomplete="off">
        </div>

        <div class="message-pane" id="messagePane">
            <svg class="hornbill-watermark" viewBox="0 0 100 100">
                <path d="M45 75 L45 95 L50 98 L55 95 L55 75 Z" />
                <path d="M40 73 L35 92 L40 94 L45 74 Z" />
                <path d="M60 73 L65 92 L60 94 L55 74 Z" />
                <path d="M36 85 L42 86 M45 87 L55 87 M58 86 L64 85" stroke="#dcdcdc" stroke-width="2"/>
                <path d="M35 45 C35 65, 45 75, 50 75 C55 75, 65 65, 65 45 C65 35, 55 30, 50 30 C45 30, 35 35, 35 45 Z" />
                <path d="M45 32 L45 18 C45 12, 55 10, 58 16 L56 32 Z" />
                <path d="M54 12 C62 8, 76 10, 84 22 L56 22 Z" fill="#dcdcdc" />
                <path d="M55 22 C65 24, 74 32, 78 40 L53 26 Z" />
                <circle cx="50" cy="18" r="1.5" fill="#4a70ab" />
            </svg>

            <div class="message-row assistant">
                <div class="bubble">YOU ARE CHATTING WITH QWEN3!</div>
            </div>
        </div>

        <div class="input-bar">
            <textarea id="userInput" placeholder="Ask Kuotsu Qwen3..."></textarea>
            <button class="send-btn" id="sendBtn" onclick="handleSendMessage()">Send</button>
        </div>
    </div>

    <script>
        // Assigned API Configuration State
        document.getElementById('apiKeyInput').value = "#API-KEY";

        let chatHistory = [
            {
                "role": "system",
                "content": "You are a direct QA assistant. Provide immediate, precise, and direct answers to questions. Strip away all conversational filler, pleasantries, preambles, and introductory or concluding remarks. Answer the question in the first sentence if possible."
            }
        ];

        const messagePane = document.getElementById('messagePane');
        const userInput = document.getElementById('userInput');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const sendBtn = document.getElementById('sendBtn');

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSendMessage();
            }
        });

        function appendBubbleToUI(role, text) {
            const row = document.createElement('div');
            row.classList.add('message-row', role);
            
            const bubble = document.createElement('div');
            bubble.classList.add('bubble');
            bubble.textContent = text;
            
            row.appendChild(bubble);
            messagePane.appendChild(row);
            messagePane.scrollTop = messagePane.scrollHeight;
        }

        function appendSystemAlert(text) {
            const alertDiv = document.createElement('div');
            alertDiv.classList.add('system-alert');
            alertDiv.textContent = text;
            messagePane.appendChild(alertDiv);
            messagePane.scrollTop = messagePane.scrollHeight;
        }

        async function handleSendMessage() {
            const rawText = userInput.value.trim();
            const apiKey = apiKeyInput.value.trim();

            if (!rawText) return;
            if (!apiKey) {
                appendSystemAlert("System Error: API Key input is blank.");
                return;
            }

            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            chatHistory.push({ "role": "user", "content": rawText });
            appendBubbleToUI('user', rawText);

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "qwen/qwen3-32b",
                        messages: chatHistory,
                        temperature: 0.1
                    })
                });

                if (!response.ok) {
                    const dataErr = await response.json();
                    throw new Error(dataErr.error?.message || `HTTP ${response.status}`);
                }

                const resultData = await response.json();
                let assistantResponse = resultData.choices[0].message.content;

                let cleanResponse = assistantResponse.replace(/<think>[\s\S]*?<\/think>/g, '').trim();
                if (!cleanResponse) cleanResponse = assistantResponse;

                chatHistory.push({ "role": "assistant", "content": cleanResponse });
                appendBubbleToUI('assistant', cleanResponse);

            } catch (error) {
                console.error(error);
                appendSystemAlert(`Assistant: Request failed: ${error.message}`);
                chatHistory.pop(); 
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }
    </script>
</body>
</html>
