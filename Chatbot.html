<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB Naga Traditional Chat Interface</title>
    <style>
        :root {
            /* Strict Red, Green, Blue color profile matching the image motifs */
            --bg-workspace: #000000;
            --bg-card: rgba(0, 0, 0, 0.85);
            --border-line: #00ff00; /* Green */
            --text-main: #ffffff; 
            --primary-accent: #ff0000; /* Red */
            --user-bubble: #ff0000; /* Red */
            --assistant-bubble: #0000ff; /* Blue */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-workspace);
            /* Recreating the exact layout of the uploaded traditional Naga shawl image!
               Features the distinct thick red side panels, thin green-and-red alternating stripes, 
               and a wide centered black canvas field.
            */
            background-image: 
                /* Left & Right Outer Thick Red Panels */
                linear-gradient(90deg, #ff0000 0%, #ff0000 12%, transparent 12%, transparent 88%, #ff0000 88%, #ff0000 100%),
                
                /* Left Inner Alternating Fine Green and Red Stripes */
                linear-gradient(90deg, transparent 12%, #00ff00 12%, #00ff00 13.5%, #ff0000 13.5%, #ff0000 15%, #00ff00 15%, #00ff00 16.5%, #ff0000 16.5%, #ff0000 18%, #00ff00 18%, #00ff00 19.5%, transparent 19.5%),
                
                /* Right Inner Alternating Fine Green and Red Stripes */
                linear-gradient(90deg, transparent 80.5%, #00ff00 80.5%, #00ff00 82%, #ff0000 82%, #ff0000 83.5%, #00ff00 83.5%, #00ff00 85%, #ff0000 85%, #ff0000 86.5%, #00ff00 86.5%, #00ff00 88%, transparent 88%),
                
                /* Subtle horizontal fabric loom weave lines */
                linear-gradient(0deg, rgba(0, 255, 0, 0.04) 1px, transparent 1px);
            
            background-size: 100% 100%, 100% 100%, 100% 100%, 100% 8px;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-wrapper {
            background: var(--bg-card);
            border: 3px solid var(--border-line);
            border-radius: 16px;
            width: 100%;
            max-width: 680px;
            height: 82vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.95),
                        0 0 30px rgba(0, 255, 0, 0.1);
            position: relative;
            backdrop-filter: blur(16px);
        }

        /* Top Decorative Border utilizing the shawl's striping layout */
        .chat-wrapper::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: repeating-linear-gradient(
                90deg,
                #ff0000 0px, #ff0000 20px,
                #00ff00 20px, #00ff00 30px,
                #0000ff 30px, #0000ff 45px,
                #00ff00 45px, #00ff00 55px
            );
            z-index: 210;
        }

        .api-header {
            padding: 18px 24px;
            background: rgba(0, 0, 0, 0.95);
            border-bottom: 2px solid var(--border-line);
            display: flex;
            gap: 12px;
            align-items: center;
            z-index: 10;
        }

        .api-header input {
            flex-grow: 1;
            background: #000000;
            border: 1px solid var(--primary-accent);
            padding: 10px 14px;
            border-radius: 8px;
            color: #00ff00;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .message-pane {
            flex-grow: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        /* Stacked SVG array reproducing the exact embroidered motifs from your image!
           Contains: Headgear, Ceremonial Horns, Crossed Daos, Shield, Crossed Spears.
        */
        .shawl-motifs-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 240px;
            height: 480px;
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
        }

        .message-row {
            display: flex;
            width: 100%;
            z-index: 5;
        }

        .message-row.user { justify-content: flex-end; }
        .message-row.assistant { justify-content: flex-start; }

        .bubble {
            max-width: 82%;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 0.98rem;
            line-height: 1.55;
            word-wrap: break-word;
        }

        .message-row.user .bubble {
            background: var(--user-bubble);
            color: #ffffff;
            border-bottom-right-radius: 4px;
            border-left: 4px solid #00ff00;
        }

        .message-row.assistant .bubble {
            background: var(--assistant-bubble);
            color: #ffffff;
            border-bottom-left-radius: 4px;
            border-right: 4px solid #ff0000;
        }

        .input-bar {
            padding: 20px 24px 24px 24px;
            border-top: 2px solid var(--border-line);
            background: #000000;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            z-index: 10;
        }

        .input-bar textarea {
            flex-grow: 1;
            background: #000000;
            border: 1px solid #ff0000;
            padding: 14px;
            border-radius: 12px;
            color: #ffffff;
            resize: none;
            height: 52px;
        }

        .send-btn {
            background: #ff0000;
            color: white;
            border: none;
            height: 52px;
            padding: 0 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .send-btn:hover {
            background: #00ff00;
            color: #000000;
        }
    </style>
</head>
<body>

    <div class="chat-wrapper">
        <div class="api-header">
            <span style="font-size: 0.8rem; font-weight: 700; color: #ff0000; letter-spacing: 1.5px;">GROQ PANEL:</span>
            <input type="password" id="apiKeyInput" placeholder="gsk_..." autocomplete="off">
        </div>

        <div class="message-pane" id="messagePane">
            
            <svg class="shawl-motifs-watermark" viewBox="0 0 100 200">
                <g transform="translate(0, 5)">
                    <path d="M42 35 C42 28, 58 28, 58 35" fill="none" stroke="#ffffff" stroke-width="2"/>
                    <path d="M44 35 C44 31, 56 31, 56 35" fill="none" stroke="#ff0000" stroke-width="1.5"/>
                    <path d="M46 35 C46 33, 54 33, 54 35" fill="none" stroke="#00ff00" stroke-width="1.5"/>
                    <path d="M50 28 L50 15 M46 29 L42 18 M54 29 L58 18 M43 32 L36 24 M57 32 L64 24" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="50" cy="13" r="1" fill="#ffffff"/>
                    <circle cx="42" cy="16" r="1" fill="#ffffff"/>
                    <circle cx="58" cy="16" r="1" fill="#ffffff"/>
                    <circle cx="35" cy="23" r="1" fill="#ffffff"/>
                    <circle cx="65" cy="23" r="1" fill="#ffffff"/>
                </g>

                <g transform="translate(0, 50)">
                    <path d="M40 25 Q50 35, 46 15 Q43 25, 40 25" fill="none" stroke="#ffffff" stroke-width="1.5"/>
                    <path d="M60 25 Q50 35, 54 15 Q57 25, 60 25" fill="none" stroke="#ffffff" stroke-width="1.5"/>
                    <circle cx="46" cy="14" r="1" fill="#ffffff"/>
                    <circle cx="54" cy="14" r="1" fill="#ffffff"/>
                </g>

                <g transform="translate(0, 85)">
                    <path d="M48 25 L36 12 L44 10 L48 25 Z" fill="#ffffff"/>
                    <path d="M48 25 L54 32" stroke="#ff0000" stroke-width="2" stroke-linecap="round"/>
                    <path d="M52 25 L64 12 L56 10 L52 25 Z" fill="#ffffff"/>
                    <path d="M52 25 L46 32" stroke="#ff0000" stroke-width="2" stroke-linecap="round"/>
                </g>

                <g transform="translate(0, 125)">
                    <path d="M42 10 L58 10 L54 32 L46 32 Z" fill="none" stroke="#ffffff" stroke-width="1.5"/>
                    <path d="M42 10 Q50 14, 58 10" fill="none" stroke="#ffffff" stroke-width="1.5"/>
                    <line x1="50" y1="10" x2="50" y2="32" stroke="#ffffff" stroke-width="1.5"/>
                    <circle cx="46" cy="21" r="1" fill="#ffffff"/>
                    <circle cx="54" cy="21" r="1" fill="#ffffff"/>
                    <path d="M58 14 L62 16 M57 20 L61 22 M56 26 L60 28" stroke="#ffffff" stroke-width="1.5"/>
                </g>

                <g transform="translate(0, 160)">
                    <line x1="36" y1="34" x2="64" y2="6" stroke="#00ff00" stroke-width="1.5"/>
                    <line x1="64" y1="34" x2="36" y2="6" stroke="#00ff00" stroke-width="1.5"/>
                    <path d="M64 6 L61 10 L66 8 Z" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
                    <path d="M36 6 L39 10 L34 8 Z" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
                    <circle cx="45" cy="25" r="2" fill="#ff0000"/>
                    <circle cx="55" cy="25" r="2" fill="#ff0000"/>
                    <circle cx="41" cy="29" r="2" fill="#ff0000"/>
                    <circle cx="59" cy="29" r="2" fill="#ff0000"/>
                </g>
            </svg>

            <div class="message-row assistant">
                <div class="bubble">The environment layout has been perfectly synced up to capture the structure of your uploaded traditional textile image, utilizing CSS gradients for the backdrop panels and highly detailed geometric SVGs to render the vertical alignment of the tribal embroidered motifs!</div>
            </div>
        </div>

        <div class="input-bar">
            <textarea id="userInput" placeholder="Message Qwen3..."></textarea>
            <button class="send-btn" id="sendBtn" onclick="handleSendMessage()">Send</button>
        </div>
    </div>

    <script>
        document.getElementById('apiKeyInput').value = "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";

        let chatHistory = [
            {
                "role": "system",
                "content": "You are a helpful assistant. Keep replies short and clear."
            }
        ];

        const messagePane = document.getElementById('messagePane');
        const userInput = document.getElementById('userInput');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const sendBtn = document.getElementById('sendBtn');

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSendMessage();
            }
        });

        function appendBubbleToUI(role, text) {
            const row = document.createElement('div');
            row.classList.add('message-row', role);
            
            const bubble = document.createElement('div');
            bubble.classList.add('bubble');
            bubble.textContent = text;
            
            row.appendChild(bubble);
            messagePane.appendChild(row);
            messagePane.scrollTop = messagePane.scrollHeight;
        }

        async function handleSendMessage() {
            const rawText = #API KEY userInput();
            const apiKey = #API KEY apiKeyInput();

            if (!rawText || !apiKey) return;

            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            chatHistory.push({ "role": "user", "content": rawText });
            appendBubbleToUI('user', rawText);

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "qwen/qwen3-32b",
                        messages: chatHistory,
                        temperature: 0.1
                    })
                });

                if (response.ok) {
                    const resultData = await response.json();
                    let assistantResponse = resultData.choices[0].message.content;
                    let cleanResponse = assistantResponse.replace(/<think>[\s\S]*?<\/think>/g, '').trim();
                    
                    chatHistory.push({ "role": "assistant", "content": cleanResponse });
                    appendBubbleToUI('assistant', cleanResponse);
                }
            } catch (error) {
                console.error(error);
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }
    </script>
</body>
</html>
